name: Publish

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/v') }}

jobs:
  test:
    name: Python tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      - name: Check release version bump
        if: github.event_name == 'pull_request'
        run: >
          python scripts/check_release_bump.py --ci
          --base-ref "${{ github.event.pull_request.base.sha }}"
          --head-ref HEAD

      - name: Check release version bump on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: >
          python scripts/check_release_bump.py --ci
          --base-ref "${{ github.event.before }}"
          --head-ref "${{ github.sha }}"

      - name: Install Playwright Chromium
        run: uv run playwright install --with-deps chromium

      - name: Type check
        run: uv run ty check src tests

      - name: Lint
        run: uv run ruff check src tests

      - name: Format check
        run: uv run ruff format --check src tests

      - name: Unit tests
        run: uv run pytest -m "not e2e"

      - name: E2E tests
        run: uv run pytest --run-e2e -m e2e --browser chromium

  build:
    name: Build distributions
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Verify tag matches package version
        run: |
          version="$(uv version --short)"
          tag_version="${GITHUB_REF_NAME#v}"

          if [ "$version" != "$tag_version" ]; then
            echo "::error::Tag '$GITHUB_REF_NAME' does not match package version '$version'."
            exit 1
          fi

      - name: Build
        run: uv build --no-sources

      - name: Smoke test wheel
        run: uv run --isolated --no-project --with ./dist/*.whl vided --help

      - name: Smoke test source distribution
        run: uv run --isolated --no-project --with ./dist/*.tar.gz vided --help

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/p/vided
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
